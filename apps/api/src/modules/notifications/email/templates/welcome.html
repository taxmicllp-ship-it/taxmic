<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
    h2 { color: #1a1a1a; }
    p { color: #555; line-height: 1.6; }
    a.button { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #4f46e5; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; }
    .footer { margin-top: 40px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome, {{firstName}}!</h2>
    <p>Your account for <strong>{{firmName}}</strong> is ready.</p>
    <p>You can now sign in and start managing your clients, documents, tasks, and invoices.</p>
    <a class="button" href="{{loginUrl}}">Sign In</a>
    <div class="footer">
      <p>If you did not create this account, please ignore this email.</p>
    </div>
  </div>
</body>
</html>
